name: Compatibility gap
description: Report behavior that differs from npm-run-all.
title: "compat: "
labels: ["type:compatibility"]
body:
  - type: input
    id: original
    attributes:
      label: Original package version
      placeholder: "npm-run-all <version>"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Commands compared
      value: |
        ```bash
        # original
        
        # run-all-now
        
        ```
    validations:
      required: true
  - type: textarea
    id: difference
    attributes:
      label: Difference
      description: Explain the output, exit code, files, or process behavior that differs.
    validations:
      required: true
