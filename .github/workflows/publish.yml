name: Publish npm packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish-platform:
    name: Publish ${{ matrix.package }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: darwin-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            binary: run-all-now
          - package: darwin-x64
            os: macos-latest
            target: x86_64-apple-darwin
            binary: run-all-now
          - package: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: run-all-now
          - package: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: run-all-now
          - package: win32-arm64
            os: windows-11-arm
            target: aarch64-pc-windows-msvc
            binary: run-all-now.exe
          - package: win32-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: run-all-now.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build native binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Prepare platform package
        run: node scripts/prepare-platform-package.js packages/${{ matrix.package }} target/${{ matrix.target }}/release/${{ matrix.binary }}
      - name: Publish platform package
        working-directory: packages/${{ matrix.package }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-main:
    name: Publish run-all-now
    runs-on: ubuntu-latest
    needs: publish-platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify package
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          npm test
          npm pack --dry-run
      - name: Publish main package
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
