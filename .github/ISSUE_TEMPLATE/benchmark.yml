name: Benchmark result
description: Share a reproducible benchmark or performance regression.
title: "bench: "
labels: ["type:benchmark", "performance"]
body:
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - CPU:
        - Disk:
        - Node:
        - Rust:
        - Commit SHA:
    validations:
      required: true
  - type: textarea
    id: commands
    attributes:
      label: Commands
      value: |
        ```bash
        
        ```
    validations:
      required: true
  - type: textarea
    id: results
    attributes:
      label: Results
      value: |
        | Command | Mean | Stddev | Max RSS |
        | --- | ---: | ---: | ---: |
        | original |  |  |  |
        | native |  |  |  |
    validations:
      required: true
