name: Bug report
description: Report incorrect behavior in run-all-now.
title: "bug: "
labels: ["type:bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Describe the behavior and the expected result.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Include commands, files, and environment details.
      value: |
        ```bash
        
        ```
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "run-all-now 0.1.0"
